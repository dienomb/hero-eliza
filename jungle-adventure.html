<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aventura en la Selva</title>
  <style>
    :root {
      --sky-top: #ffe4b5;  --sky-mid: #87ceeb;  --sky-bottom: #b5e8b5;
      --jungle-dark: #1a3d08;  --jungle-mid: #2a5c12;  --jungle-light: #3a7020;
      --gold: #FFD700;  --gold-dark: #c8860a;
      --pink: #ff69b4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: radial-gradient(ellipse at center, #1a4a0a 0%, #050d05 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #game {
      width: 900px;
      height: 580px;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 70px rgba(0,0,0,0.85),
                  0 0 40px rgba(255,105,180,0.15),
                  inset 0 0 0 3px rgba(255,215,0,0.25);
      animation: gameIn 0.7s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes gameIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ===== WORLD ===== */
    #world {
      width: 100%;
      height: 63%;
      position: relative;
      background: linear-gradient(180deg, #ffe4b5 0%, #87ceeb 38%, #b5e8b5 65%, #4a8a20 100%);
      overflow: hidden;
    }

    /* ===== CLOUDS ===== */
    .cloud {
      position: absolute;
      left: -80px;
      opacity: 0.75;
      pointer-events: none;
      animation: drift linear infinite;
    }
    @keyframes drift {
      from { transform: translateX(-120px); }
      to   { transform: translateX(960px); }
    }

    .tree {
      position: absolute;
      bottom: 30px;
      font-size: 64px;
      opacity: 0.7;
      pointer-events: none;
    }

    #ground {
      position: absolute;
      bottom: 0; width: 100%; height: 48px;
      background: linear-gradient(180deg, #8B6914 0%, #5a3f15 55%, #3d2a0e 100%);
    }

    #road {
      position: absolute;
      bottom: 12px; width: 100%; height: 28px;
      background: linear-gradient(180deg, #d4a03a, #b87a20);
      border-top: 2px solid #f0c040;
    }

    #road::after {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      border-top: 2px dashed rgba(255,255,255,0.2);
    }

    /* ===== COIN COUNTER ===== */
    #coin-counter {
      position: absolute;
      top: 8px; left: 10px;
      background: linear-gradient(135deg, #ffd700, #ff9500);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      padding: 5px 14px;
      color: #3d1f00;
      font-size: 22px;
      font-weight: bold;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 14px rgba(255,165,0,0.65), inset 0 1px 0 rgba(255,255,255,0.4);
      text-shadow: 0 1px 2px rgba(255,255,255,0.4);
    }

    /* ===== HERO (rider on horse) ===== */
    #hero {
      position: absolute;
      bottom: 18px;
      left: 3%;
      width: 95px;
      height: 110px;
      z-index: 5;
      transition: left 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #hero.gallop    { animation: gallop  1s ease; }
    #hero.shake     { animation: shake   0.5s ease; }
    #hero.celebrate { animation: bounce  0.5s ease infinite alternate; }

    @keyframes gallop {
      0%,100% { transform: translateY(0) rotate(0deg); }
      20%     { transform: translateY(-14px) rotate(-4deg); }
      40%     { transform: translateY(-7px)  rotate(2deg); }
      60%     { transform: translateY(-11px) rotate(-2deg); }
      80%     { transform: translateY(-5px)  rotate(1deg); }
    }
    @keyframes shake {
      0%,100%  { transform: translateX(0); }
      20%,60%  { transform: translateX(-9px); }
      40%,80%  { transform: translateX(9px); }
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-14px); }
    }

    /* ===== ENEMIES ===== */
    .enemy {
      position: absolute;
      bottom: 18px;
      width: 60px;
      height: 90px;
      z-index: 4;
      transition: transform 0.6s ease, opacity 0.6s ease;
      transform-origin: bottom center;
    }

    .enemy.defeated {
      transform: rotate(85deg) translateX(25px);
      opacity: 0.25;
    }

    /* ===== FLOATING COIN ===== */
    .float-coin {
      position: absolute;
      font-size: 30px;
      z-index: 20;
      pointer-events: none;
      animation: floatUp 0.9s ease forwards;
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-70px) scale(1.6); }
    }

    /* ===== CARROT BUCKET ===== */
    #bucket-wrap {
      position: absolute;
      bottom: 26px;
      right: 3%;
      width: 72px;
      height: 72px;
    }

    /* ===== QUESTION PANEL ===== */
    #panel {
      width: 100%;
      height: 37%;
      background: linear-gradient(180deg, #1a3d08 0%, #2a5c12 50%, #1a3d08 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 6px 20px;
      position: relative;
      box-shadow: inset 0 4px 16px rgba(0,0,0,0.4);
    }

    #panel::before {
      content: '🌸🌿🌺🌿🌸🌿🌺🌿🌸🌿🌺🌿🌸🌿🌺🌿🌸🌿🌺🌿🌸🌿🌺🌿';
      position: absolute;
      top: -4px; left: 0;
      font-size: 14px;
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
      pointer-events: none;
    }

    /* Emoji counting area */
    #emoji-area {
      text-align: center;
      line-height: 1.3;
      max-width: 840px;
      word-break: break-all;
      display: none;
    }

    /* Parent-read text */
    #q-text {
      color: white;
      font-size: 25px;
      text-align: center;
      max-width: 700px;
      display: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      letter-spacing: 0.3px;
    }

    /* Question controls */
    #question-controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 8px;
    }

    #repeat-btn {
      padding: 8px 16px;
      font-size: 18px;
      font-family: inherit;
      background: linear-gradient(135deg, #fdcb6e, #e17055);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 0 rgba(0,0,0,0.25), 0 6px 12px rgba(0,0,0,0.15);
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    #repeat-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.25), 0 8px 16px rgba(0,0,0,0.18); }
    #repeat-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.25); }

    /* Answer buttons */
    #btns { display: flex; gap: 14px; }

    .btn {
      min-width: 140px;
      padding: 13px 10px;
      font-size: 28px;
      font-family: inherit;
      font-weight: bold;
      border: none;
      border-radius: 22px;
      cursor: pointer;
      color: white;
      transition: transform 0.1s, box-shadow 0.1s;
      text-align: center;
      line-height: 1.2;
      box-shadow: 0 7px 0 rgba(0,0,0,0.28), 0 10px 20px rgba(0,0,0,0.18);
      text-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 10px 0 rgba(0,0,0,0.28), 0 14px 24px rgba(0,0,0,0.2);
    }
    .btn:active:not(:disabled) {
      transform: translateY(5px) scale(0.97);
      box-shadow: 0 2px 0 rgba(0,0,0,0.28);
    }
    .btn:disabled { cursor: default; }

    .btn-a { background: linear-gradient(160deg, #ff6b6b, #d63031); }
    .btn-b { background: linear-gradient(160deg, #55efc4, #00b894); }
    .btn-c { background: linear-gradient(160deg, #74b9ff, #0984e3); }

    .btn.flash-ok { animation: flashOk 0.5s ease; }
    .btn.flash-no { animation: flashNo 0.5s ease; }

    @keyframes flashOk { 50% { background: linear-gradient(160deg, #f9ca24, #f0932b); transform: translateY(-3px) scale(1.15); } }
    @keyframes flashNo { 50% { background: linear-gradient(160deg, #922b21, #6b0000); transform: translateY(5px) scale(0.9);  } }

    /* ===== WIN SCREEN ===== */
    #win-screen {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      z-index: 50;
      background: linear-gradient(135deg, rgba(255,105,180,0.96) 0%, rgba(39,174,96,0.96) 100%);
      backdrop-filter: blur(4px);
    }

    #win-screen h1       { font-size: 48px; color: white; text-shadow: 2px 2px 12px rgba(0,0,0,0.3); }
    #win-screen .reward  { font-size: 44px; }
    #win-screen p        { font-size: 22px; color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }

    #win-screen .play-btn {
      padding: 14px 44px;
      font-size: 22px;
      font-family: inherit;
      background: linear-gradient(135deg, #ffd700, #ff9500);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: bold;
      color: #3d1f00;
      box-shadow: 0 5px 0 rgba(0,0,0,0.2), 0 8px 16px rgba(0,0,0,0.15);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #win-screen .play-btn:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 7px 0 rgba(0,0,0,0.2); }
    #win-screen .play-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }

    /* ===== CONFETTI ===== */
    .confetti {
      position: absolute;
      border-radius: 3px;
      pointer-events: none;
      animation: fall linear forwards;
    }

    @keyframes fall {
      from { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      to   { opacity: 0; transform: translateY(620px) rotate(720deg); }
    }

    /* ===== ENCOURAGEMENT ===== */
    .encouragement {
      position: absolute;
      font-size: 2em;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.5), 0 0 12px #ff69b4;
      pointer-events: none;
      animation: floatUp 1.5s ease forwards;
      z-index: 30;
      bottom: 42%;
      white-space: nowrap;
    }
  </style>
</head>
<body>

let state = {};

function initGame() {
  state = {
    coins:    0,
    defeated: 0,
    questions: shuffle([...ALL_QUESTIONS]).slice(0, 7),
    busy:     false,
    current:  null,
  };

  document.getElementById('coin-count').textContent = '0';
  resetHero();
  buildEnemies();
  document.getElementById('win-screen').style.display = 'none';
  loadQuestion(state.questions[0]);
}

function buildEnemies() {
  document.querySelectorAll('.enemy').forEach(e => e.remove());

  ENEMY_LEFT_PCT.forEach((pct, i) => {
    const div = document.createElement('div');
    div.className = 'enemy';
    div.id        = 'enemy' + i;
    div.style.left = pct + '%';
    div.innerHTML  = (i % 2 === 0) ? lionSVG() : robotSVG();
    document.getElementById('world').appendChild(div);
  });
}

// ================================================================
// QUESTION DISPLAY
// ================================================================
function renderTicTacToe(boardString) {
  // Parse board string: "XXO|XXO|___"
  const rows = boardString.split('|');
  let display = '';

  rows.forEach(row => {
    row.split('').forEach(cell => {
      if (cell === 'X') display += '❌ ';
      else if (cell === 'O') display += '⭕ ';
      else display += '⬜ ';
    });
    display += '\n';
  });

  return display;
}

function loadQuestion(qObj) {
  state.current = qObj;

  const emojiArea = document.getElementById('emoji-area');
  const qText     = document.getElementById('q-text');
  const btns      = document.querySelectorAll('.btn');

  if (qObj.type === 'count') {
    // Scale emoji size based on count
    const count    = qObj.emojis.length / 2; // rough emoji count (each emoji ~2 chars)
    const fontSize = count <= 5 ? 44 : count <= 10 ? 34 : count <= 15 ? 28 : 24;

    emojiArea.style.display   = 'block';
    emojiArea.style.fontSize  = fontSize + 'px';
    emojiArea.textContent     = qObj.emojis;
    qText.style.display       = 'none';
  } else if (qObj.type === 'noughts') {
    // Display tic-tac-toe board
    emojiArea.style.display = 'block';
    emojiArea.style.fontSize = '36px';
    emojiArea.textContent = renderTicTacToe(qObj.board);
    qText.style.display = 'block';
    qText.textContent = qObj.text;
  } else if (qObj.type === 'translation') {
    // Display English word to translate
    emojiArea.style.display = 'block';
    emojiArea.style.fontSize = '48px';
    emojiArea.textContent = qObj.english;
    qText.style.display = 'block';
    qText.textContent = qObj.text;
  } else if (qObj.type === 'color') {
    emojiArea.style.display = 'block';
    emojiArea.style.fontSize = '72px';
    emojiArea.textContent = qObj.emoji;
    qText.style.display = 'block';
    qText.textContent = '¿Qué color es en inglés? (= ' + qObj.spanish + ')';
  } else if (qObj.type === 'bodypart') {
    emojiArea.style.display = 'block';
    emojiArea.style.fontSize = '64px';
    emojiArea.textContent = qObj.emoji;
    qText.style.display = 'block';
    qText.textContent = 'En inglés, ' + qObj.spanish + ' se dice...';
  } else if (qObj.type === 'numbername') {
    emojiArea.style.display = 'block';
    emojiArea.style.fontSize = '40px';
    emojiArea.textContent = '🌟'.repeat(qObj.count);
    qText.style.display = 'block';
    qText.textContent = '¿Cómo se dice ' + qObj.count + ' en inglés?';
  } else {
    emojiArea.style.display = 'none';
    qText.style.display     = 'block';  // Show text, and we'll also speak it
    qText.textContent       = qObj.text;
  }

  const isWordBtn = ['color', 'bodypart', 'numbername'].includes(qObj.type);
  btns.forEach((btn, i) => {
    btn.textContent = qObj.a[i];
    btn.disabled    = false;
    btn.className   = 'btn btn-' + ['a', 'b', 'c'][i];
    // Size: word answers smaller, emoji answers bigger
    btn.style.fontSize = isWordBtn ? '22px' : (qObj.type === 'read' && qObj.a[i].length <= 4) ? '36px' : '26px';
  });

  // Speak the question aloud
  speakQuestion(qObj);
}

// ================================================================
// TEXT-TO-SPEECH
// ================================================================
function speakQuestion(qObj) {
  let textToSpeak = '';
  let language = 'es-ES';

  if (qObj.type === 'count') {
    textToSpeak = '¿Cuántos hay?';
    language = 'es-ES';
  } else if (qObj.type === 'translation') {
    textToSpeak = qObj.english;
    language = 'en-US';
  } else if (qObj.type === 'color') {
    textToSpeak = '¿Qué color es en inglés? ' + qObj.spanish;
    language = 'es-ES';
  } else if (qObj.type === 'bodypart') {
    textToSpeak = 'En inglés, ' + qObj.spanish + ' se dice...';
    language = 'es-ES';
  } else if (qObj.type === 'numbername') {
    const esNums = ['','uno','dos','tres','cuatro','cinco','seis','siete'];
    textToSpeak = '¿Cómo se dice ' + esNums[qObj.count] + ' en inglés?';
    language = 'es-ES';
  } else {
    textToSpeak = qObj.text;
    language = 'es-ES';
  }

  performSpeech(textToSpeak, language);
}

function performSpeech(textToSpeak, language = 'es-ES') {
  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(textToSpeak);
  utterance.lang = language;
  utterance.rate = 0.9;
  utterance.pitch = 1.2;

  window.speechSynthesis.speak(utterance);
}

function repeatQuestion() {
  if (!state.current) return;
  speakQuestion(state.current);
}

// ================================================================
// ANSWER
// ================================================================
function answer(idx) {
  if (state.busy || !state.current) return;
  state.busy = true;

  const btns = document.querySelectorAll('.btn');
  btns.forEach(b => b.disabled = true);

  if (idx === state.current.ok) {
    btns[idx].classList.add('flash-ok');
    playWinSound();
    setTimeout(onCorrect, 600);
  } else {
    btns[idx].classList.add('flash-no');
    playLoseSound();
    shakeHero();
    setTimeout(() => {
      loadQuestion(state.current);
      state.busy = false;
    }, 750);
  }
}

function showEncouragement() {
  const msgs = ['¡Muy bien!','¡Fantástico!','¡Eres una campeona!','¡Increíble!','¡Genial!','¡Excelente!'];
  const msg = msgs[Math.floor(Math.random() * msgs.length)];
  const el = document.createElement('div');
  el.className = 'encouragement';
  el.textContent = msg;
  el.style.left = (25 + Math.random() * 45) + '%';
  document.getElementById('game').appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

function onCorrect() {
  showEncouragement();

  // Add coin
  state.coins++;
  document.getElementById('coin-count').textContent = state.coins;

  // Move hero toward next enemy
  const stopIdx = state.defeated + 1;
  moveHero(stopIdx, true, () => {
    defeatEnemy(state.defeated, () => {
      state.defeated++;

      if (state.defeated >= 7) {
        // All 7 defeated — gallop to bucket!
        setTimeout(() => {
          moveHero(8, true, () => {
            celebrate();
            setTimeout(showWin, 1200);
          });
        }, 400);
      } else {
        state.busy = false;
        loadQuestion(state.questions[state.defeated]);
      }
    });
  });
}

// ================================================================
// DEFEAT ENEMY
// ================================================================
function defeatEnemy(idx, cb) {
  const enemy = document.getElementById('enemy' + idx);
  if (!enemy) { if (cb) cb(); return; }

  enemy.classList.add('defeated');

  // Floating coin at enemy position
  const gameRect  = document.getElementById('game').getBoundingClientRect();
  const enemyRect = enemy.getBoundingClientRect();
  const coin = document.createElement('div');
  coin.className    = 'float-coin';
  coin.textContent  = '🪙';
  coin.style.left   = (enemyRect.left - gameRect.left + 15) + 'px';
  coin.style.top    = (enemyRect.top  - gameRect.top  + 20) + 'px';
  document.getElementById('game').appendChild(coin);
  setTimeout(() => coin.remove(), 1000);

  setTimeout(() => { if (cb) cb(); }, 700);
}

// ================================================================
// HERO MOVEMENT
// ================================================================
function moveHero(stopIdx, animate, cb) {
  const hero = document.getElementById('hero');
  hero.classList.remove('gallop', 'shake', 'celebrate');

  if (!animate) {
    hero.style.transition = 'none';
    hero.style.left = STOPS[stopIdx];
    void hero.offsetWidth;
    hero.style.transition = '';
    if (cb) cb();
    return;
  }

  void hero.offsetWidth;
  hero.classList.add('gallop');
  hero.style.left = STOPS[stopIdx];

  setTimeout(() => {
    hero.classList.remove('gallop');
    if (cb) cb();
  }, 1050);
}

function shakeHero() {
  const hero = document.getElementById('hero');
  hero.classList.remove('shake');
  void hero.offsetWidth;
  hero.classList.add('shake');
  setTimeout(() => hero.classList.remove('shake'), 550);
}

function resetHero() {
  const hero = document.getElementById('hero');
  hero.classList.remove('gallop', 'shake', 'celebrate');
  moveHero(0, false);
}

// ================================================================
// WIN & CONFETTI
// ================================================================
function celebrate() {
  document.getElementById('hero').classList.add('celebrate');
  playVictorySound();
  spawnConfetti();
}

function showWin() {
  document.getElementById('final-coins').textContent = state.coins;
  document.getElementById('win-screen').style.display = 'flex';
}

function spawnConfetti() {
  const colors = ['#F1C40F','#E74C3C','#3498DB','#2ECC71','#9B59B6','#ff69b4','#ffffff','#E67E22'];
  const game   = document.getElementById('game');

  for (let i = 0; i < 65; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.cssText = `
      left:${Math.random() * 100}%;
      top:-12px;
      width:${6 + Math.random() * 11}px;
      height:${6 + Math.random() * 11}px;
      background:${colors[i % colors.length]};
      animation-duration:${1.5 + Math.random() * 2}s;
      animation-delay:${Math.random() * 0.9}s;
    `;
    game.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

// ================================================================
// RESET
// ================================================================
function resetGame() {
  document.querySelectorAll('.confetti').forEach(el => el.remove());
  document.getElementById('hero').classList.remove('celebrate', 'gallop', 'shake');
  initGame();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ================================================================
// SOUND EFFECTS
// ================================================================
function playLoseSound() {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();

    osc.connect(gain);
    gain.connect(audioContext.destination);

    osc.frequency.setValueAtTime(200, audioContext.currentTime);
    osc.frequency.setValueAtTime(100, audioContext.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
    gain.gain.setValueAtTime(0, audioContext.currentTime + 0.2);

    osc.start(audioContext.currentTime);
    osc.stop(audioContext.currentTime + 0.2);
  } catch (e) {
    // Silently fail if Web Audio API not available
  }
}

function playWinSound() {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();

    osc.connect(gain);
    gain.connect(audioContext.destination);

    osc.frequency.setValueAtTime(523, audioContext.currentTime);
    osc.frequency.setValueAtTime(659, audioContext.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
    gain.gain.setValueAtTime(0, audioContext.currentTime + 0.2);

    osc.start(audioContext.currentTime);
    osc.stop(audioContext.currentTime + 0.2);
  } catch (e) {
    // Silently fail if Web Audio API not available
  }
}

function playVictorySound() {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    const notes = [523, 659, 784, 1046]; // C, E, G, C (higher octave)
    const duration = 0.15;

    notes.forEach((freq, i) => {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.frequency.setValueAtTime(freq, audioContext.currentTime + i * duration);
      gain.gain.setValueAtTime(0.2, audioContext.currentTime + i * duration);
      gain.gain.setValueAtTime(0, audioContext.currentTime + i * duration + duration);

      osc.start(audioContext.currentTime + i * duration);
      osc.stop(audioContext.currentTime + i * duration + duration);
    });
  } catch (e) {
    // Silently fail if Web Audio API not available
  }
}

// ================================================================
// START
// ================================================================
window.addEventListener('load', initGame);
</script>
